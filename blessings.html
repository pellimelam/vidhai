<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Divine Blessings – Vidhwaan Group</title>

<link rel="stylesheet" href="./css/design-system.css">
<link rel="stylesheet" href="./css/main.css">

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
padding-top:0 !important;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
color:#e2e8f0;
overflow-x:hidden;

/* 🌈 PREMIUM BACKGROUND */
background:
radial-gradient(circle at 20% 20%, #1e3a8a 0%, transparent 40%),
radial-gradient(circle at 80% 0%, #2563eb 0%, transparent 40%),
#020617;
}

/* ===== NAVBAR ===== */
.nav{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;

background:linear-gradient(90deg, rgba(2,6,23,0.9), rgba(30,64,175,0.6));
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-inner{
max-width:1100px;
margin:auto;
padding:0 14px;
height:50px;
display:flex;
align-items:center;
justify-content:space-between;
}

.nav-left{
display:flex;
align-items:center;
gap:8px;
}

.nav-logo{
width:28px;
height:28px;
border-radius:50%;
}

.brand{
font-size:12px;
max-width:140px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.nav-links{
display:flex;
gap:18px;
}

.nav-links a{
color:#cbd5f5;
font-size:13px;
text-decoration:none;
transition:0.2s;
}

.nav-links a:hover{
color:#fff;
}

/* MOBILE NAV */
.nav-toggle{
display:none;
flex-direction:column;
gap:4px;
cursor:pointer;
}

.nav-toggle span{
width:22px;
height:2px;
background:#fff;
}

@media(max-width:768px){
.nav-toggle{display:flex;}

.nav-links{
position:fixed;
top:50px;
left:0;
right:0;
background:#020617;
padding:18px;
display:none;
flex-direction:column;
gap:16px;
}

.nav-links.active{display:flex;}
}

/* ===== HERO ===== */
.hero{
text-align:center;
padding:20px 16px 10px;
margin-top:60px;
}

.hero img{
width:85px;
height:85px;
border-radius:50%;
margin-bottom:8px;
}

.hero-title{
font-size:22px;
font-weight:600;
background:linear-gradient(90deg,#fff,#93c5fd,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-title span{
display:block;
font-size:14px;
color:#94a3b8;
}

/* ===== SLIDER ===== */
.slider{
max-width:1200px;
margin:10px auto 30px;
border-radius:24px;
overflow:hidden;
position:relative;

background:
radial-gradient(circle at center, #1e40af 0%, #020617 70%);

box-shadow:0 25px 80px rgba(0,0,0,0.6);
}

/* BLUR FILL BACKGROUND */
.slider::after{
content:"";
position:absolute;
inset:0;
background:inherit;
filter:blur(40px);
opacity:0.5;
z-index:1;
}

.slider-track{
display:flex;
transition:transform 0.5s ease;
position:relative;
z-index:2;
}

/* 🔥 FULL IMAGE NO CROP */
.slider img{
width:100%;
height:380px;
object-fit:contain;
border-radius:16px;
flex-shrink:0;
}

/* BUTTONS */
.slide-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:40px;
height:40px;
border:none;
border-radius:50%;
background:rgba(255,255,255,0.1);
color:#fff;
cursor:pointer;
z-index:3;
}

.slide-btn.left{left:10px;}
.slide-btn.right{right:10px;}

.slide-btn:hover{
background:#2563eb;
}

/* MOBILE */
@media(max-width:768px){
.slider img{height:240px;}
}

/* ===== SEARCH ===== */
.search-box{
max-width:600px;
margin:10px auto 20px;
padding:0 16px;
}

.search-box input{
width:100%;
padding:16px 18px;

border-radius:18px;
border:1px solid rgba(255,215,0,0.4);

background:linear-gradient(135deg,#3b2f0b,#8b6f1f,#d4af37);

color:#fff8dc;
font-size:15px;

box-shadow:
0 8px 25px rgba(212,175,55,0.5),
inset 0 0 10px rgba(255,215,0,0.3);
}

.search-box input:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 20px rgba(37,99,235,0.6);
}

/* ===== GRID ===== */
.section{
max-width:1100px;
margin:auto;
padding:10px 16px 30px;
}

.yt-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:28px;
}

/* ===== BEAUTIFUL CARD ===== */
.card{
border-radius:20px;
overflow:hidden;
cursor:pointer;

background:linear-gradient(145deg,#2c2206,#6b5515,#d4af37);

border:1px solid rgba(255,215,0,0.4);

box-shadow:
0 10px 30px rgba(212,175,55,0.4);

transition:all 0.3s ease;
}

/* THUMB */
.card img{
width:100%;
aspect-ratio:16/9;

object-fit:contain;

background:linear-gradient(135deg,#3b2f0b,#8b6f1f);

border-radius:12px;
padding:6px;
}

/* TITLE */
.card .title{
font-size:14px;
font-weight:600;

color:#fff4c2;

line-height:1.5;
padding:12px;
text-align:center;
}

/* HOVER */
.card:hover{
transform:translateY(-6px);

box-shadow:
0 15px 40px rgba(255,215,0,0.7);
}

/* ===== PLAYER ===== */
.player-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:9999;
}

.close{
position:absolute;
top:10px;
right:10px;

/* 🔥 BIG CLICK AREA */
width:48px;
height:48px;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;
color:#fff;

background:rgba(0,0,0,0.6);
border-radius:50%;

cursor:pointer;
z-index:10000;

/* smooth feel */
transition:0.2s;
}

/* HOVER */
.close:hover{
background:#ef4444;
transform:scale(1.1);
}


.close::after{
content:"";
position:absolute;
inset:-10px; /* 🔥 extra invisible click area */
}
  

.player-frame{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.player-frame iframe{
width:100%;
height:100%;
border:none;
}

.controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
}

.controls button{
padding:12px 20px;

border:none;
border-radius:14px;

/* 🏆 GOLD + HIGH VISIBILITY */
background:linear-gradient(135deg,#d4af37,#facc15);

color:#000;
font-weight:600;
font-size:14px;

box-shadow:0 8px 25px rgba(212,175,55,0.6);

cursor:pointer;
transition:0.2s;
}

.controls button:hover{
transform:scale(1.05);
box-shadow:0 12px 30px rgba(255,215,0,0.8);
}

.controls button:hover{
background:#2563eb;
}

/* ===== AUDIO ===== */
.mute-btn{
position:fixed;
bottom:16px;
right:16px;
background:linear-gradient(135deg,#2563eb,#1e40af);
padding:12px;
border-radius:50%;
cursor:pointer;
box-shadow:0 10px 40px rgba(37,99,235,0.7);
}

/* ===== EMPTY ===== */
#noResults{
text-align:center;
margin-top:20px;
color:#94a3b8;
}

html{
scroll-behavior:smooth;
}

</style>
</head>

<body>

<header class="nav">
  <div class="nav-inner">

    <div class="nav-left">
      <img src="/swamy/logoswamy.png" class="nav-logo">
      <span class="brand">Bhagavan Shri Shri Shri Venkaiah Swamy</span>
    </div>

    <div class="nav-toggle" id="navToggle">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav class="nav-links" id="navLinks">
      <a href="https://www.google.com/maps?q=CJ4R%2B832%2C%20Golipalem%2C%20Andhra%20Pradesh%20524345" target="_blank">
        📍 Location
      </a>
      <a href="#videos">Videos</a>
    </nav>

  </div>
</header>

<div class="hero">
<img src="/swamy/logoswamy.png">
<h1 class="hero-title">
Shri Shri Shri Sadhguru
<span>Shrihari Venkaiah Swamy</span>
</h1>
</div>


  
<!-- SLIDER -->
<section class="slider">

  <button class="slide-btn left" onclick="slidePrev()">‹</button>

  <div class="slider-track" id="sliderTrack">
    <img src="/swamy/slideswamy-1.png">
    <img src="/swamy/slideswamy-2.png">
    <img src="/swamy/slideswamy-3.png">
    <img src="/swamy/slideswamy-4.png">
    <img src="/swamy/slideswamy-5.png">
    <img src="/swamy/slideswamy-6.png">
    <img src="/swamy/slideswamy-7.png">
    <img src="/swamy/slideswamy-8.png">
  </div>

  <button class="slide-btn right" onclick="slideNext()">›</button>

</section>

<div class="section" id="videos">

  <!-- SEARCH -->
  <div class="search-box">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="🔍 Search videos, dates, keywords..."
      oninput="handleSearch()"
    />
  </div>

  <!-- GRID -->
  <div id="videoGrid" class="yt-grid"></div>

  <!-- EMPTY -->
  <div id="noResults">No videos found</div>

</div>

<div id="overlay" class="player-overlay">
<div class="close" onclick="closePlayer()">×</div>
<div class="player-frame">
<iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>
<div class="controls">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>
</div>


<audio id="bg-audio" loop muted>
<source src="/swamy/swamy.mp3">
</audio>
  

<div class="mute-btn" onclick="toggleMute()">🔇</div>



<script>

/* ================= NAV ================= */
const toggle = document.getElementById("navToggle");
const links = document.getElementById("navLinks");

toggle.onclick = () => {
  links.classList.toggle("active");
  toggle.classList.toggle("active");
};


/* ================= SLIDER ================= */

/* ===== CENTERED PREMIUM SLIDER ===== */

const track = document.getElementById("sliderTrack");
let slides = Array.from(track.children);

/* clone for loop */
slides.forEach(s => track.appendChild(s.cloneNode(true)));
slides = Array.from(track.children);

let index = 0;
let slideWidth = 0;
let auto = true;

/* CENTER MODE */
function updateSlider(){
  const slider = document.querySelector(".slider");
  slideWidth = slider.offsetWidth;

  const offset = (slider.offsetWidth - slideWidth) / 2;

  track.style.transform = `translateX(${-index * slideWidth}px)`;
}

/* MOVE */
function goTo(i){
  index = i;

  track.style.transition = "transform 0.5s ease";
  track.style.transform = `translateX(${-index * slideWidth}px)`;

  if(index >= slides.length / 2){
    setTimeout(()=>{
      track.style.transition = "none";
      index = 0;
      track.style.transform = `translateX(0px)`;
    },500);
  }
}

/* BUTTONS */
function slideNext(){
  auto = false;
  goTo(index + 1);
}

function slidePrev(){
  auto = false;
  index = Math.max(index - 1, 0);
  goTo(index);
}

/* AUTO */
setInterval(()=>{
  if(auto) goTo(index + 1);
},3500);

/* TOUCH */
let startX = 0;

track.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  auto = false;
});

track.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) goTo(index + 1);
  if(endX - startX > 50) goTo(index - 1);

  setTimeout(()=> auto = true, 4000);
});

/* INIT */
window.addEventListener("resize", updateSlider);
setTimeout(updateSlider, 200);



/* ================= AUDIO ================= */
/* ================= AUDIO ================= */

const audio = document.getElementById("bg-audio");
audio.muted = true;

let audioStarted = false;
let isMuted = false;

let audioFade = null;

/* START AUDIO */
function startAudio(){

if(audioStarted) return;

audio.volume = 0;
audio.muted = isMuted;

audio.play().then(()=>{

let vol = 0;

if(audioFade) clearInterval(audioFade);

audioFade = setInterval(()=>{

if(isMuted){
clearInterval(audioFade);
return;
}

vol += 0.02;

if(vol >= 0.3){
audio.volume = 0.3;
clearInterval(audioFade);
audioStarted = true;

document.removeEventListener("click", tryStartAudio);
document.removeEventListener("touchstart", tryStartAudio);

}else{
audio.volume = vol;
}

}, 200);

}).catch(()=>{});
}



/* MUTE */
function toggleMute(){

if(audio.paused){
  audio.muted = false;
  audio.volume = 0.3;
  audio.play().catch(()=>{});
  isMuted = false;
}else{
  audio.pause();
  isMuted = true;
}

document.querySelector(".mute-btn").innerText = isMuted ? "🔇" : "🔊";

}


/* ================= VIDEO SYSTEM ================= */

let playlist = [];
let allVideos = [];
let originalVideos = [];
let current = 0;

/* LOAD ALL VIDEOS */
async function loadAllVideos(){

let res = await fetch("/videos.json");
let data = await res.json();

allVideos = data.map(v => ({
  id: { videoId: v.id },
  snippet: {
    title: v.title,
    thumbnails: {
      medium: { url: v.thumb }
    }
  },
  raw: v.title.toLowerCase()
}));

originalVideos = [...allVideos];
playlist = allVideos;

render();
}

/* RENDER */
function render(){

let grid = document.getElementById("videoGrid");
let empty = document.getElementById("noResults");

if(!playlist.length){
grid.innerHTML = "";
empty.style.display = "block";
return;
}else{
empty.style.display = "none";
}

grid.innerHTML = playlist.map((v,i)=>`
<div class="card" onclick="play(${i})">
<img src="${v.snippet.thumbnails.medium.url}">
<div class="title">${v.snippet.title}</div>
</div>
`).join("");

}

/* PLAYER */
function play(i){
current = i;
openPlayer();
}

function openPlayer(){

  /* 🔥 STOP BACKGROUND AUDIO COMPLETELY */
  audio.pause();
  audio.currentTime = 0;
  isMuted = true;
  document.querySelector(".mute-btn").innerText = "🔇";

  const player = document.getElementById("player");

  /* stop current video instantly */
  player.src = "";

  /* small delay = smoother switch */
  setTimeout(()=>{
    let id = playlist[current].id.videoId;

    player.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&playsinline=1`;
  },50);

  document.getElementById("overlay").style.display = "block";

  document.body.style.overflow = "hidden";

}

function closePlayer(){

document.getElementById("overlay").style.display = "none";
document.getElementById("player").src = "";

document.exitFullscreen?.();

document.body.style.overflow = "";


}

/* NEXT / PREV */
function next(){
current = (current + 1) % playlist.length;
openPlayer();
}

function prev(){
current = (current - 1 + playlist.length) % playlist.length;
openPlayer();
}


/* ================= AI SEARCH ================= */

function normalize(str){
return str.replace(/[^a-z0-9 ]/g," ").toLowerCase();
}

function levenshtein(a, b){
const m = [];
for(let i=0;i<=b.length;i++){ m[i]=[i]; }
for(let j=0;j<=a.length;j++){ m[0][j]=j; }

for(let i=1;i<=b.length;i++){
for(let j=1;j<=a.length;j++){
m[i][j] = b.charAt(i-1)==a.charAt(j-1)
? m[i-1][j-1]
: Math.min(
m[i-1][j-1]+1,
m[i][j-1]+1,
m[i-1][j]+1
);
}
}
return m[b.length][a.length];
}

function matchDate(query, text){
let q = query.replace(/[^0-9 ]/g,"");
if(!q) return false;
return text.includes(q);
}

function handleSearch(){

let q = document.getElementById("searchInput").value.trim().toLowerCase();

if(!q){
playlist = originalVideos;
render();
return;
}

let nq = normalize(q);

let results = originalVideos.map(v => {

let title = normalize(v.raw);
let score = 0;

if(title.includes(nq)) score += 100;

let words = nq.split(" ");
let matchCount = words.filter(w => title.includes(w)).length;
score += matchCount * 20;

let dist = levenshtein(nq, title.slice(0, nq.length));
if(dist < 4) score += (10 - dist);

if(matchDate(nq, title)) score += 30;

return { video: v, score };

})
.filter(x => x.score > 5)
.sort((a,b)=> b.score - a.score)
.map(x => x.video);

playlist = results.length ? results : originalVideos;
render();

}


/* ================= INIT ================= */
loadAllVideos();

</script>



</body>
</html>
