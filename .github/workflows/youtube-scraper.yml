name: YouTube FULL JSON Generator

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: |
          npm init -y
          npm install playwright node-fetch@2
          npx playwright install chromium

      - name: Create scraper
        run: |
          cat << 'EOF' > scraper.js
          const { chromium } = require("playwright");
          const fetch = require("node-fetch");
          const fs = require("fs");

          const CHANNEL_URL = "https://www.youtube.com/@bhagwansrisrisrivenkayyasw7002/videos";

          /* ===== GET REAL DATE FROM ytInitialPlayerResponse ===== */
          async function getVideoDate(videoId){
            try{
              const res = await fetch(`https://www.youtube.com/watch?v=${videoId}`);
              const html = await res.text();

              const match = html.match(/ytInitialPlayerResponse\s*=\s*(\{.*?\});/s);

              if(match){
                const json = JSON.parse(match[1]);

                const iso =
                  json.microformat?.playerMicroformatRenderer?.publishDate;

                if(iso){
                  const [y,m,d] = iso.split("-");
                  return `${d}-${m}-${y}`; // DD-MM-YYYY
                }
              }

            }catch(e){
              console.log("ERROR:", videoId);
            }

            return "";
          }

          (async () => {

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage();

          await page.goto(CHANNEL_URL, { waitUntil: "domcontentloaded" });
          await page.waitForTimeout(5000);

          const { ytData } = await page.evaluate(() => {

            let ytData = null;

            document.querySelectorAll("script").forEach(s => {
              if (s.innerText.includes("ytInitialData")) {
                const m = s.innerText.match(/ytInitialData = (.*?);/s);
                if (m) ytData = JSON.parse(m[1]);
              }
            });

            return { ytData };
          });

          let items =
            ytData.contents.twoColumnBrowseResultsRenderer.tabs
            .find(t => t.tabRenderer.selected)
            .tabRenderer.content.richGridRenderer.contents;

          let videos = [];
          let continuation = null;

          function extract(items){
            items.forEach(item=>{
              const v = item.richItemRenderer?.content?.videoRenderer;

              if(v){
                videos.push({
                  id: v.videoId,
                  title: v.title?.runs?.[0]?.text || "",
                  thumb: `https://i.ytimg.com/vi/${v.videoId}/hqdefault.jpg`
                });
              }

              const c =
                item.continuationItemRenderer?.continuationEndpoint
                ?.continuationCommand?.token;

              if(c) continuation = c;
            });
          }

          extract(items);

          while (continuation) {

            const res = await fetch(
              `https://www.youtube.com/youtubei/v1/browse`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  context:{
                    client:{
                      clientName:"WEB",
                      clientVersion:"2.20210721.00.00"
                    }
                  },
                  continuation
                })
              }
            );

            const json = await res.json();

            const contents =
              json.onResponseReceivedActions?.[0]
              ?.appendContinuationItemsAction?.continuationItems || [];

            continuation = null;
            extract(contents);

            await new Promise(r => setTimeout(r, 300));
          }

          /* REMOVE DUPLICATES */
          const seen = new Set();
          videos = videos.filter(v=>{
            if(seen.has(v.id)) return false;
            seen.add(v.id);
            return true;
          });

          console.log("Total videos:", videos.length);

          /* ===== FETCH DATES (PARALLEL) ===== */
          const batchSize = 8;

          for(let i=0; i<videos.length; i+=batchSize){

            const batch = videos.slice(i, i+batchSize);

            await Promise.all(batch.map(async v=>{
              v.date = await getVideoDate(v.id);

              if(!v.date){
                console.log("NO DATE:", v.id);
              }
            }));

            console.log(`Processed ${i + batch.length}/${videos.length}`);
          }

          /* ===== SORT NEW → OLD ===== */
          videos.sort((a,b)=>{
            if(!a.date && !b.date) return 0;
            if(!a.date) return 1;
            if(!b.date) return -1;

            const [d1,m1,y1] = a.date.split("-");
            const [d2,m2,y2] = b.date.split("-");

            const da = new Date(`${y1}-${m1}-${d1}`);
            const db = new Date(`${y2}-${m2}-${d2}`);

            return db - da;
          });

          fs.writeFileSync("videos.json", JSON.stringify(videos, null, 2));

          console.log("FINAL:", videos.length);

          await browser.close();

          })();
          EOF

      - run: node scraper.js

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add videos.json
          git diff --cached --quiet || git commit -m "videos updated with real dates"
          git push
